<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Venom X Loader</title>
    <style>
        /* ================= CSS DESIGN ================= */
        :root {
            --bg-matte: #0a0a0a; --elec-blue: #00f3ff; --neon-purple: #b500ff; --cyan-high: #00ffff; --text-white: #ffffff;
            --glass-bg: rgba(20, 20, 30, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-matte); color: var(--text-white); padding: 20px; }
        
        .admin-wrap { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: var(--elec-blue); margin-bottom: 30px; text-shadow: 0 0 10px var(--elec-blue); }
        
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
        }
        .sec-title { color: var(--neon-purple); margin-bottom: 15px; border-bottom: 1px solid var(--neon-purple); padding-bottom: 5px; }
        
        input {
            width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-purple); color: white; border-radius: 8px; outline: none;
        }
        input:focus { border-color: var(--elec-blue); }
        
        .neon-btn {
            background: transparent; color: var(--elec-blue); border: 1px solid var(--elec-blue);
            padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        .neon-btn:hover { background: var(--elec-blue); color: var(--bg-matte); box-shadow: 0 0 20px var(--elec-blue); }
    </style>
</head>
<body>

<div class="admin-wrap">
    <h1>👑 Admin Dashboard</h1>

    <!-- Global Settings -->
    <div class="glass-card">
        <h3 class="sec-title">🌐 Update Logo & Banner</h3>
        <input type="text" id="in-logo" placeholder="Website Logo Image URL">
        <input type="text" id="in-banner" placeholder="Home Banner Image URL">
        <button class="neon-btn" id="btn-settings">Update Branding</button>
    </div>

    <!-- Live Counters -->
    <div class="glass-card">
        <h3 class="sec-title">📊 Update Live Counters</h3>
        <input type="number" id="in-users" placeholder="Total Users">
        <input type="number" id="in-down" placeholder="Total Downloads">
        <input type="number" id="in-online" placeholder="Online Users">
        <button class="neon-btn" id="btn-counters">Update Counters</button>
    </div>

    <!-- Add Product -->
    <div class="glass-card">
        <h3 class="sec-title">🛒 Add New Product</h3>
        <input type="text" id="in-p-name" placeholder="Product Name">
        <input type="number" id="in-p-price" placeholder="Price (INR)">
        <input type="text" id="in-p-img" placeholder="Product Image URL">
        <button class="neon-btn" id="btn-product">Add to Store</button>
    </div>

    <!-- Add Video -->
    <div class="glass-card">
        <h3 class="sec-title">🎥 Add YouTube Video</h3>
        <input type="text" id="in-v-title" placeholder="Video Title">
        <input type="text" id="in-v-url" placeholder="YouTube Video Link">
        <button class="neon-btn" id="btn-video">Publish Video</button>
    </div>
</div>

<!-- ================= JAVASCRIPT & FIREBASE ================= -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwGPYu7QDPf2yLLkuzvKJW73yNyqLui98",
        authDomain: "gaming-mitul-store.firebaseapp.com",
        projectId: "gaming-mitul-store",
        storageBucket: "gaming-mitul-store.firebasestorage.app",
        messagingSenderId: "941763401463",
        appId: "1:941763401463:web:6d08a7353bac6c9827e5f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Settings Function
    document.getElementById('btn-settings').addEventListener('click', async () => {
        const logo = document.getElementById('in-logo').value;
        const banner = document.getElementById('in-banner').value;
        const data = {};
        if(logo) data.logoUrl = logo;
        if(banner) data.bannerUrl = banner;
        
        await setDoc(doc(db, "settings", "global"), data, { merge: true });
        alert("Branding Updated Instantly in User Panel!");
    });

    // Counters Function
    document.getElementById('btn-counters').addEventListener('click', async () => {
        await setDoc(doc(db, "counters", "live"), {
            users: document.getElementById('in-users').value || 0,
            downloads: document.getElementById('in-down').value || 0,
            online: document.getElementById('in-online').value || 0
        });
        alert("Live Counters Updated!");
    });

    // Product Add Function
    document.getElementById('btn-product').addEventListener('click', async () => {
        const name = document.getElementById('in-p-name').value;
        const price = document.getElementById('in-p-price').value;
        const img = document.getElementById('in-p-img').value;

        if(!name || !price || !img) return alert("Please fill all product fields!");

        await addDoc(collection(db, "products"), {
            name: name,
            price: price,
            imageUrl: img,
            timestamp: new Date()
        });
        alert("Product Successfully Added to Store!");
        document.getElementById('in-p-name').value = '';
        document.getElementById('in-p-price').value = '';
        document.getElementById('in-p-img').value = '';
    });

    // Video Add Function
    document.getElementById('btn-video').addEventListener('click', async () => {
        const title = document.getElementById('in-v-title').value;
        const url = document.getElementById('in-v-url').value;

        if(!title || !url) return alert("Please fill all video fields!");

        await addDoc(collection(db, "videos"), {
            title: title,
            url: url,
            timestamp: new Date()
        });
        alert("Video Published Successfully!");
        document.getElementById('in-v-title').value = '';
        document.getElementById('in-v-url').value = '';
    });
</script>
</body>
</html>
