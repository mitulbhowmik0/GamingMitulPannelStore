<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venom X Loader</title>
    <style>
        /* ================= CSS DESIGN ================= */
        :root {
            --bg-matte: #0a0a0a;
            --elec-blue: #00f3ff;
            --neon-purple: #b500ff;
            --cyan-high: #00ffff;
            --text-white: #ffffff;
            --glass-bg: rgba(20, 20, 30, 0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-matte); color: var(--text-white); display: flex; justify-content: center; }
        
        .app-container {
            width: 100%; max-width: 480px; min-height: 100vh; position: relative;
            padding-bottom: 80px; background: #0d0d12;
            border-left: 1px solid rgba(0, 243, 255, 0.1); border-right: 1px solid rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: var(--elec-blue); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }
        
        header {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;
            background: rgba(10, 10, 10, 0.95); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--neon-purple); box-shadow: 0 4px 15px rgba(181, 0, 255, 0.2);
        }
        .dynamic-logo { height: 35px; transition: 0.3s; }
        
        .neon-btn {
            background: transparent; color: var(--elec-blue); border: 1px solid var(--elec-blue);
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; transition: 0.3s; width: 100%; box-shadow: 0 0 8px rgba(0, 243, 255, 0.2);
        }
        .neon-btn:hover { background: var(--elec-blue); color: var(--bg-matte); box-shadow: 0 0 20px var(--elec-blue); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-img { width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        
        .counters { display: flex; justify-content: space-around; text-align: center; }
        .counters h2 { color: var(--cyan-high); font-size: 24px; }
        .counters p { color: rgba(255,255,255,0.6); font-size: 10px; font-weight: bold; }
        
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 480px; background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid var(--cyan-high); display: flex; justify-content: space-around;
            padding: 15px 0; backdrop-filter: blur(10px); z-index: 1000;
        }
        .bottom-nav a { text-decoration: none; font-size: 26px; transition: transform 0.2s; filter: drop-shadow(0px 0px 8px rgba(0, 255, 255, 0.4)); }
        .bottom-nav a:hover { transform: translateY(-5px) scale(1.15); }
        
        .powered-by { text-align: center; font-size: 11px; color: rgba(255, 255, 255, 0.4); padding: 20px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 5px var(--neon-purple); }
        
        .section-view { display: none; padding: 15px; }
        .section-view.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ================= HEADER ================= -->
    <header>
        <img src="" alt="Venom X" class="dynamic-logo" id="main-logo">
        <div style="font-size: 22px; cursor: pointer;">🔔</div>
    </header>

    <!-- ================= MAIN CONTENT ================= -->
    <main>
        <!-- Home Section -->
        <div id="sec-home" class="section-view active">
            <img src="" id="home-banner" style="width:100%; border-radius:10px; border:1px solid var(--neon-purple); margin-bottom:15px; display:none;">
            
            <div class="glass-card counters">
                <div><h2 id="cnt-users">0</h2><p>USERS</p></div>
                <div><h2 id="cnt-down">0</h2><p>DOWNLOADS</p></div>
                <div><h2 id="cnt-online">0</h2><p>ONLINE</p></div>
            </div>

            <h3 style="color:var(--elec-blue); margin-bottom:10px;">⚡ Quick Access</h3>
            <div class="grid-2">
                <button class="neon-btn" onclick="navTo('sec-store')">Premium Store</button>
                <button class="neon-btn" onclick="navTo('sec-videos')">Watch Videos</button>
            </div>
        </div>

        <!-- Store Section -->
        <div id="sec-store" class="section-view">
            <h3 style="color:var(--cyan-high); margin-bottom:15px; text-align:center;">🛒 Premium Store</h3>
            <div class="grid-2" id="product-list">
                <p style="grid-column: span 2; text-align: center;">Loading Products...</p>
            </div>
        </div>

        <!-- Downloads Section -->
        <div id="sec-downloads" class="section-view">
            <h3 style="color:var(--neon-purple); margin-bottom:15px; text-align:center;">⬇️ VIP Downloads</h3>
            <div class="glass-card" style="text-align: center;">
                <p style="margin-bottom: 10px; font-weight:bold;">Venom X Injector Pro</p>
                <button class="neon-btn" onclick="checkAuthAndProceed()">Download Now</button>
            </div>
        </div>

        <!-- Videos Section -->
        <div id="sec-videos" class="section-view">
            <h3 style="color:var(--elec-blue); margin-bottom:15px; text-align:center;">🎥 Gameplay & Shorts</h3>
            <div id="video-list">
                <p style="text-align: center;">Loading Videos...</p>
            </div>
        </div>
        
        <div class="powered-by">Powered By Gaming Mitul YT</div>
    </main>

    <!-- ================= BOTTOM NAV ================= -->
    <nav class="bottom-nav">
        <a href="#" onclick="navTo('sec-home')">🏠</a>
        <a href="#" onclick="navTo('sec-store')">🛒</a>
        <a href="#" onclick="navTo('sec-downloads')">⬇️</a>
        <a href="#" onclick="navTo('sec-videos')">🎥</a>
        <a href="#" onclick="checkAuthAndProceed()">👤</a>
    </nav>
</div>

<!-- ================= MODAL ================= -->
<div id="auth-modal" class="modal">
    <div class="glass-card modal-content">
        <h2 style="color: var(--neon-purple); margin-bottom: 15px;">⚠️ Access Notice</h2>
        <p id="auth-msg" style="margin-bottom: 20px; font-size: 14px; line-height: 1.5;"></p>
        <button class="neon-btn" onclick="document.getElementById('auth-modal').style.display='none'">Close</button>
    </div>
</div>

<!-- ================= JAVASCRIPT & FIREBASE ================= -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwGPYu7QDPf2yLLkuzvKJW73yNyqLui98",
        authDomain: "gaming-mitul-store.firebaseapp.com",
        projectId: "gaming-mitul-store",
        storageBucket: "gaming-mitul-store.firebasestorage.app",
        messagingSenderId: "941763401463",
        appId: "1:941763401463:web:6d08a7353bac6c9827e5f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Navigation System
    window.navTo = function(secId) {
        document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
        document.getElementById(secId).classList.add('active');
    }

    // Security & Telegram Check
    window.checkAuthAndProceed = function() {
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const modal = document.getElementById('auth-modal');
        const msg = document.getElementById('auth-msg');
        
        if (isTelegram) {
            msg.innerHTML = "<b>Security Alert!</b><br><br>Login, Purchase, or Downloads are <b>NOT ALLOWED</b> inside the Telegram web browser.<br><br>Please tap the 3 dots at the top right and select <b>'Open in Chrome / Safari'</b> to continue.";
        } else {
            msg.innerHTML = "Login form will be displayed here.<br>(Development in progress)";
        }
        modal.style.display = 'flex';
    }

    // Realtime Sync: Global Settings (Logo & Banner)
    onSnapshot(doc(db, "settings", "global"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            if(data.logoUrl) document.getElementById('main-logo').src = data.logoUrl;
            if(data.bannerUrl) {
                document.getElementById('home-banner').src = data.bannerUrl;
                document.getElementById('home-banner').style.display = 'block';
            }
        }
    });

    // Realtime Sync: Live Counters
    onSnapshot(doc(db, "counters", "live"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('cnt-users').innerText = data.users || 0;
            document.getElementById('cnt-down').innerText = data.downloads || 0;
            document.getElementById('cnt-online').innerText = data.online || 0;
        }
    });

    // Realtime Sync: Store Products
    onSnapshot(collection(db, "products"), (snapshot) => {
        const store = document.getElementById('product-list');
        store.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const p = docSnap.data();
            store.innerHTML += `
                <div class="glass-card" style="padding:10px;">
                    <img src="${p.imageUrl}" class="product-img">
                    <h4 style="font-size:14px; margin-bottom:5px;">${p.name}</h4>
                    <p style="color:var(--elec-blue); font-weight:bold; margin-bottom:10px;">₹${p.price}</p>
                    <button class="neon-btn" style="padding:5px; font-size:12px;" onclick="checkAuthAndProceed()">Buy Now</button>
                </div>
            `;
        });
    });

    // Realtime Sync: YouTube Videos
    onSnapshot(collection(db, "videos"), (snapshot) => {
        const vids = document.getElementById('video-list');
        vids.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const v = docSnap.data();
            vids.innerHTML += `
                <div class="glass-card">
                    <h4 style="margin-bottom:10px; color:var(--cyan-high);">${v.title}</h4>
                    <a href="${v.url}" target="_blank" style="text-decoration:none;">
                        <button class="neon-btn">▶ Watch Video</button>
                    </a>
                </div>
            `;
        });
    });
</script>
</body>
</html>
